<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Products - Clothing Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="loadAdminProducts(); setInterval(loadAdminProducts, 3000)">
<div class="container">
    <div class="topbar">
        <h1>Admin - Product Management</h1>
        <div>
            <a class="button secondary" href="admin-orders.html">View Orders</a>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="form-card">
        <h2 id="formTitle">Add Product</h2>

        <input id="productId" type="hidden">

        <label>Name</label>
        <input id="name" type="text">

        <label>Category</label>
        <input id="category" type="text">

        <label>Details</label>
        <input id="details" type="text">

        <label>Price</label>
        <input id="price" type="number" step="0.01">

        <label>Stock</label>
        <input id="stock" type="number">

        <button onclick="saveProduct()">Save Product</button>
        <button class="secondary" onclick="clearForm()">Clear</button>
    </div>

    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Details</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="productsBody"></tbody>
    </table>

    <p id="message" class="message"></p>
</div>

<script src="js/auth.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
